name: Recon Auto

on:
  workflow_dispatch:
    inputs:
      websites:
        description: "Paste domains separated by space or comma"
        required: true
        type: string
      batch_size:
        description: "Domains per batch. Use 2, 3, or 5"
        required: true
        default: "3"
        type: string
      nuclei_minutes:
        description: "Max minutes for nuclei per batch"
        required: true
        default: "45"
        type: string

jobs:
  prepare:
    runs-on: ubuntu-latest

    outputs:
      batches: ${{ steps.make_batches.outputs.batches }}

    steps:
      - name: Prepare domain batches
        id: make_batches
        run: |
          mkdir -p targets batches

          echo "${{ github.event.inputs.websites }}" \
            | tr ', ' '\n' \
            | sed '/^$/d' \
            | sed 's#https://##g; s#http://##g; s#/.*##g' \
            | sort -u > targets/current.txt

          BATCH_SIZE="${{ github.event.inputs.batch_size }}"
          split -l "$BATCH_SIZE" -d -a 2 targets/current.txt batches/batch-

          BATCHES=$(ls batches | jq -R -s -c 'split("\n")[:-1]')
          echo "batches=$BATCHES" >> "$GITHUB_OUTPUT"

      - name: Upload prepared targets
        uses: actions/upload-artifact@v4
        with:
          name: prepared-targets
          path: |
            targets/
            batches/

  recon:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 350
    continue-on-error: true

    strategy:
      fail-fast: false
      max-parallel: 5
      matrix:
        batch: ${{ fromJson(needs.prepare.outputs.batches) }}

    steps:
      - name: Download prepared targets
        uses: actions/download-artifact@v4
        with:
          name: prepared-targets
          path: .

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      - name: Install ProjectDiscovery tools
        run: |
          go install -v github.com/projectdiscovery/subfinder/v2/cmd/subfinder@latest
          go install -v github.com/projectdiscovery/httpx/cmd/httpx@latest
          go install -v github.com/projectdiscovery/nuclei/v3/cmd/nuclei@latest
          echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Update nuclei templates
        run: |
          nuclei -update-templates || true

      - name: Run recon for batch
        run: |
          set +e

          RUN_DIR="results/run-${{ github.run_id }}"
          OUT_DIR="$RUN_DIR/${{ matrix.batch }}"
          mkdir -p "$OUT_DIR"

          TARGETS="batches/${{ matrix.batch }}"
          SUBS="$OUT_DIR/subfinder.txt"
          HTTPX="$OUT_DIR/httpx.txt"
          HTTPX_URLS="$OUT_DIR/httpx-urls.txt"
          NUCLEI="$OUT_DIR/nuclei.txt"
          LOG="$OUT_DIR/run-log.txt"

          echo "[+] Batch started: $(date)" | tee -a "$LOG"
          echo "[+] Batch targets:" | tee -a "$LOG"
          cat "$TARGETS" | tee -a "$LOG"

          echo "[+] Running subfinder..." | tee -a "$LOG"
          while read -r domain; do
            subfinder -silent -d "$domain" || true
          done < "$TARGETS" | sort -u | tee "$SUBS"

          if [ ! -s "$SUBS" ]; then
            echo "No subdomains found." | tee -a "$HTTPX" "$NUCLEI" "$LOG"
            exit 0
          fi

          echo "[+] Running httpx..." | tee -a "$LOG"
          timeout 60m httpx -silent \
            -l "$SUBS" \
            -status-code \
            -title \
            -tech-detect \
            -content-length \
            -web-server \
            -ip \
            -cdn \
            -location \
            -response-time \
            -o "$HTTPX" || true

          awk '{print $1}' "$HTTPX" | grep '^http' | sort -u > "$HTTPX_URLS" || true

          grep '\[200\]' "$HTTPX" > "$OUT_DIR/httpx-200.txt" || true
          grep '\[301\]' "$HTTPX" > "$OUT_DIR/httpx-301.txt" || true
          grep '\[302\]' "$HTTPX" > "$OUT_DIR/httpx-302.txt" || true
          grep '\[307\]' "$HTTPX" > "$OUT_DIR/httpx-307.txt" || true
          grep '\[308\]' "$HTTPX" > "$OUT_DIR/httpx-308.txt" || true
          grep '\[403\]' "$HTTPX" > "$OUT_DIR/httpx-403.txt" || true
          grep '\[404\]' "$HTTPX" > "$OUT_DIR/httpx-404.txt" || true
          grep '\[500\]' "$HTTPX" > "$OUT_DIR/httpx-500.txt" || true
          grep '\[502\]' "$HTTPX" > "$OUT_DIR/httpx-502.txt" || true
          grep '\[503\]' "$HTTPX" > "$OUT_DIR/httpx-503.txt" || true

          {
            echo "# HTTPX Status Report"
            echo ""
            echo "Generated at: $(date)"
            echo ""
            echo "## 200 OK"
            cat "$OUT_DIR/httpx-200.txt" || true
            echo ""
            echo "## 301 Redirect"
            cat "$OUT_DIR/httpx-301.txt" || true
            echo ""
            echo "## 302 Redirect"
            cat "$OUT_DIR/httpx-302.txt" || true
            echo ""
            echo "## 307 Redirect"
            cat "$OUT_DIR/httpx-307.txt" || true
            echo ""
            echo "## 403 Forbidden"
            cat "$OUT_DIR/httpx-403.txt" || true
            echo ""
            echo "## 404 Not Found"
            cat "$OUT_DIR/httpx-404.txt" || true
            echo ""
            echo "## 5xx Server Errors"
            cat "$OUT_DIR/httpx-500.txt" || true
            cat "$OUT_DIR/httpx-502.txt" || true
            cat "$OUT_DIR/httpx-503.txt" || true
          } > "$OUT_DIR/httpx-status-report.md"

          if [ ! -s "$HTTPX_URLS" ]; then
            echo "No live URLs for nuclei." | tee -a "$NUCLEI" "$LOG"
            exit 0
          fi

          echo "[+] Running nuclei..." | tee -a "$LOG"
          timeout "${{ github.event.inputs.nuclei_minutes }}m" nuclei -silent \
            -l "$HTTPX_URLS" \
            -severity critical,high,medium,low \
            -es info,unknown \
            -rl 50 \
            -c 25 \
            -o "$NUCLEI" || echo "Nuclei stopped after time limit or no findings." | tee -a "$NUCLEI" "$LOG"

          echo "[+] Batch completed: $(date)" | tee -a "$LOG"
          exit 0

      - name: Upload batch results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: batch-results-${{ matrix.batch }}
          path: results/
          retention-days: 30

  save:
    needs: recon
    if: always()
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Download all batch results
        uses: actions/download-artifact@v4
        with:
          pattern: batch-results-*
          path: downloaded-results
          merge-multiple: true

      - name: Save results into repo
        run: |
          mkdir -p results

          echo "Downloaded files:"
          find downloaded-results -type f || true

          cp -R downloaded-results/* results/ || true

          echo "# Recon Run ${{ github.run_id }}" > results/run-${{ github.run_id }}-summary.md
          echo "" >> results/run-${{ github.run_id }}-summary.md
          echo "Saved at: $(date)" >> results/run-${{ github.run_id }}-summary.md
          echo "" >> results/run-${{ github.run_id }}-summary.md
          echo "Files saved:" >> results/run-${{ github.run_id }}-summary.md
          find results -type f | sort >> results/run-${{ github.run_id }}-summary.md

          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

          git add results
          git commit -m "Recon results run-${{ github.run_id }}" || echo "No changes to commit"
          git push || true
